<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background: #fff;
            padding: 25px 35px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        h3 {
            margin-bottom: 8px;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #2575fc;
            box-shadow: 0 0 5px rgba(37,117,252,0.4);
        }

        textarea {
            resize: none;
            height: 60px;
        }

        label {
            font-size: 14px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            width: auto;
            margin-right: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2575fc;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #1a5edb;
        }
    </style>
</head>
<body>
    <form action="./login.html">
        <h1>Register</h1>
        <h3><u>Details</u></h3>
        Name:<input type="text" placeholder="Enter Name" name="name" required><br><br>
        Email: <input type="email" placeholder="Enter email" name="email" required><br><br>
        Password: <input type="password" placeholder="Enter Password" name="password" required><br><br>
        Confirm Password: <input type="passsword" placeholder="re enter password" name="repassword" required><br><br>
        Mobile: <input type="number" placeholder="Enter phone number" name="number"><br>
        <div>
            <h3><u>Gender</u></h3>
            <input type="radio" value="male" name="gender" id="gmale"><label for="gmale">Male</label>
            <input type="radio" value="female" name="gender" id="gfemale"><label for="gfemale">Female</label>
        </div>
        <div>
            <h3><u>Education</u></h3>
            <input type="checkbox" value="10th">10th
            <input type="checkbox" value="inter">Inter
            <input type="checkbox" value="diploma">Diploma
            <input type="checkbox" value="btech">Btech
        </div>
        <div>
            <h3><u>City</u></h3>
            <select>
                <option value="">Select</option>
                <option value="hyderabad">Hyderabad</option>
                <option value="vijayawada">Vijayawada</option>
                <option value="banglore">Banglore</option>
            </select>
        </div>
        <div>
            <h3><u>Address</u></h3>
            <textarea name=""placeholder="enter Address" id=""></textarea>
        </div>
        <div>

            <label for="">Date of Birth</label>
            <input type="date">
        </div><br>
        <div>
            <label for="">Profile Pic:</label>
            <input type="file" required>
        </div><br>

        <button>Submit</button>

    </form>
</body>
</html>
