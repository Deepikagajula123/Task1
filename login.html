<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        form {
            background: #fff;
            padding: 30px;
            width: 300px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ff7e5f;
            box-shadow: 0 0 5px rgba(255,126,95,0.5);
        }

        a {
            display: block;
            font-size: 14px;
            margin: 5px 0;
            color: #ff7e5f;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #ff7e5f;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #e5674f;
        }
    </style>
</head>
<body>
    <form action="./biography.html">
        <p>
            Email: <input type="text" placeholder="Enter email" required></p><br><br>
        <p></p>Password: <input type="text" placeholder="Enter Password" required></p><br><br>
        <a href="">forget password?</a><br><br>
        <a href="./index.html">Dont have an account?</a><br><br>
        <button>Login</button>
    </form>

</body>
</html>
